name: Release gerber-caserne

on:
  push:
    tags:
      - 'gerber-v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Tag metadata
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER_LC/gerber-caserne:$TAG" >> "$GITHUB_OUTPUT"
          echo "image_latest=ghcr.io/$OWNER_LC/gerber-caserne:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notify vps-docker-manager-prod
        env:
          INFRA_PAT: ${{ secrets.INFRA_DISPATCH_PAT }}
          TAG: ${{ needs.build.outputs.tag }}
          SHA: ${{ needs.build.outputs.sha }}
        run: |
          # vps-docker-manager-prod's deploy.yml is generic and expects:
          #   event_type: app-release
          #   client_payload: { app, app_repo, tag, deploy_vps_ref }
          curl -fsS -X POST \
            -H "Authorization: Bearer $INFRA_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/eRom/vps-docker-manager-prod/dispatches \
            -d "{\"event_type\":\"app-release\",\"client_payload\":{\"app\":\"gerber\",\"app_repo\":\"eRom/gerber-caserne\",\"tag\":\"$TAG\",\"deploy_vps_ref\":\"$SHA\"}}"
